<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | HIMS Module</title>
    <link rel="icon" href="../../assets/images/brand/favicon.svg" type="image/svg+xml" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../../assets/js/core/theme-boot.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body data-page="profile">
    <div class="app">
      <div id="sidebar"></div>
      <main class="main-content">
        <div id="navbar"></div>
        <section class="page-wrapper">
          <div class="page-header">
            <div>
              <h1>My Profile</h1>
              <p>View and update your account information.</p>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><h3>Account</h3></div>
            <form class="fleet-form">
              <div class="form-grid">
                <div class="form-group">
                  <label for="profName">Full name</label>
                  <input type="text" id="profName" value="User Name" />
                </div>
                <div class="form-group">
                  <label for="profRole">Role</label>
                  <input type="text" id="profRole" value="Staff" readonly />
                </div>
                <div class="form-group">
                  <label for="profEmail">Email</label>
                  <input type="email" id="profEmail" value="user@hospital.example" />
                </div>
                <div class="form-group">
                  <label for="profPhone">Phone</label>
                  <input type="tel" id="profPhone" />
                </div>
              </div>
              <div class="u-flex u-gap-3" style="justify-content: flex-end; margin-top: var(--space-6)">
                <button type="button" class="btn-outline">Cancel</button>
                <button type="submit" class="btn-primary">Save Profile</button>
              </div>
            </form>
          </div>
        </section>
      </main>
      <div id="toast"><div id="toastContainer" class="toast-container"></div></div>
    </div>
  </body>
</html>
