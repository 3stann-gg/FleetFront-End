<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | HIMS Module</title>
    <link rel="icon" href="../../assets/images/brand/favicon.svg" type="image/svg+xml" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../../assets/js/core/theme-boot.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body data-page="dashboard">
    <div class="app">
      <div id="sidebar">
        <!-- Replace with components/sidebar.html content or include -->
      </div>
      <main class="main-content">
        <div id="navbar">
          <!-- Replace with components/navbar.html content or include -->
        </div>
        <section class="page-wrapper">
          <header class="page-header">
            <div>
              <h1>Module Dashboard</h1>
              <p>Overview of key indicators for this HIMS module.</p>
            </div>
          </header>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon"><i class="ph-fill ph-chart-bar" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Total Records</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon success"><i class="ph-fill ph-check-circle" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Active</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon warning"><i class="ph-fill ph-clock" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Pending</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon info"><i class="ph-fill ph-info" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Alerts</p></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>Recent Activity</h3></div>
            <p class="fleet-meta">Replace with module activity list or table.</p>
          </div>
        </section>
      </main>
      <div id="toast"><div id="toastContainer" class="toast-container"></div></div>
    </div>
  </body>
</html>
