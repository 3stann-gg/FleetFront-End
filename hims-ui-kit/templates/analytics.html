<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics | HIMS Module</title>
    <link rel="icon" href="../../assets/images/brand/favicon.svg" type="image/svg+xml" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../../assets/js/core/theme-boot.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body data-page="analytics">
    <div class="app">
      <div id="sidebar"></div>
      <main class="main-content">
        <div id="navbar"></div>
        <section class="page-wrapper">
          <div class="page-header">
            <div>
              <h1>Analytics</h1>
              <p>Visual overview for module performance indicators.</p>
            </div>
          </div>

          <div class="toolbar">
            <div class="toolbar-left">
              <select class="filter-select" aria-label="Date range">
                <option>Last 7 days</option>
                <option>Last 30 days</option>
                <option>This year</option>
              </select>
            </div>
            <div class="toolbar-right">
              <button type="button" class="btn-outline">Refresh</button>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon info"><i class="ph-fill ph-chart-line"></i></div>
              <div class="stat-content"><h3>0</h3><p>Volume</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon success"><i class="ph-fill ph-trend-up"></i></div>
              <div class="stat-content"><h3>0%</h3><p>Growth</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon warning"><i class="ph-fill ph-timer"></i></div>
              <div class="stat-content"><h3>0</h3><p>Avg. time</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon"><i class="ph-fill ph-users"></i></div>
              <div class="stat-content"><h3>0</h3><p>Users</p></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>Chart area</h3></div>
            <p class="fleet-meta">
              Use the same custom CSS/SVG chart approach as Fleet reports/cost analysis when implementing charts.
              Do not introduce a separate chart design language.
            </p>
            <p class="report-chart-empty">No chart data yet.</p>
          </div>
        </section>
      </main>
      <div id="toast"><div id="toastContainer" class="toast-container"></div></div>
    </div>
  </body>
</html>
