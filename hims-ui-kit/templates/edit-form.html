<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit | HIMS Module</title>
    <link rel="icon" href="../../assets/images/brand/favicon.svg" type="image/svg+xml" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../../assets/js/core/theme-boot.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body data-page="edit">
    <div class="app">
      <div id="sidebar"></div>
      <main class="main-content">
        <div id="navbar"></div>
        <section class="page-wrapper">
          <div class="page-header">
            <div>
              <h1>Edit Record</h1>
              <p>Update the information for this record.</p>
            </div>
            <span class="status-badge available">Active</span>
          </div>
          <div class="card">
            <form class="fleet-form">
              <div class="form-grid">
                <div class="form-group">
                  <label for="editName">Name <span class="required">*</span></label>
                  <input type="text" id="editName" required value="Sample record" />
                </div>
                <div class="form-group">
                  <label for="editRef">Reference</label>
                  <input type="text" id="editRef" value="REF-001" readonly />
                  <p class="form-helper">System reference is read-only.</p>
                </div>
                <div class="form-group">
                  <label for="editType">Type</label>
                  <select id="editType">
                    <option selected>Type A</option>
                    <option>Type B</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="editStatus">Status</label>
                  <select id="editStatus">
                    <option selected>Active</option>
                    <option>Pending</option>
                    <option>Completed</option>
                  </select>
                </div>
                <div class="form-group full-width">
                  <label for="editNotes">Notes</label>
                  <textarea id="editNotes" rows="4">Sample notes for this record.</textarea>
                </div>
              </div>
              <div class="u-flex u-gap-3" style="justify-content: flex-end; margin-top: var(--space-6)">
                <button type="button" class="btn-outline">Cancel</button>
                <button type="submit" class="btn-primary">Update Record</button>
              </div>
            </form>
          </div>
        </section>
      </main>
      <div id="toast"><div id="toastContainer" class="toast-container"></div></div>
    </div>
  </body>
</html>
