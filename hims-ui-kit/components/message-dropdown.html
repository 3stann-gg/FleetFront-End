<!--
  HIMS UI Kit — Message panel (presentation pattern)
  Pair with navbar messages control
-->
<div class="export-dropdown hims-utility-dropdown" id="himsMessageDropdown">
  <button
    type="button"
    class="icon-btn export-menu-toggle"
    aria-label="Messages"
    aria-expanded="false"
    aria-haspopup="true"
  >
    <i class="ph ph-envelope-simple" aria-hidden="true"></i>
  </button>
  <div class="export-menu" hidden role="menu" aria-label="Messages list">
    <button type="button" class="export-menu-item" role="menuitem">
      Sample message subject
    </button>
    <button type="button" class="export-menu-item" role="menuitem">
      Another message
    </button>
    <button type="button" class="export-menu-item" role="menuitem">
      Open inbox
    </button>
  </div>
</div>
