<!-- HIMS UI Kit — Error State -->
<div class="card" role="alert" style="border-color: var(--color-danger); padding: var(--space-6)">
  <div class="u-flex u-gap-3" style="align-items: flex-start">
    <i class="ph-fill ph-warning-circle" style="font-size: 1.5rem; color: var(--color-danger)" aria-hidden="true"></i>
    <div>
      <h3 style="margin: 0 0 var(--space-2); color: var(--color-danger-text)">Something went wrong</h3>
      <p class="fleet-meta" style="margin: 0 0 var(--space-4)">
        The request could not be completed. Check your connection or try again.
      </p>
      <button type="button" class="btn-outline">Try again</button>
    </div>
  </div>
</div>
