<!-- HIMS UI Kit — Confirmation / Delete Modal -->
<div
  class="modal-overlay"
  id="himsConfirmModal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="himsConfirmTitle"
>
  <div class="custom-modal delete-modal">
    <div class="delete-icon">
      <i class="ph-fill ph-warning-circle" aria-hidden="true"></i>
    </div>
    <h2 id="himsConfirmTitle">Confirm Action</h2>
    <p>
      Are you sure you want to continue with
      <strong id="himsConfirmTarget">this item</strong>?
    </p>
    <p class="delete-note">This action cannot be undone.</p>
    <div class="modal-footer">
      <button type="button" class="btn-outline" id="himsConfirmCancel">Cancel</button>
      <button type="button" class="btn-danger" id="himsConfirmOk">
        <i class="ph ph-trash" aria-hidden="true"></i>
        Confirm
      </button>
    </div>
  </div>
</div>
