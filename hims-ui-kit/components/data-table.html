<!-- HIMS UI Kit — Data Table -->
<div class="card">
  <div class="table-responsive">
    <table class="fleet-table">
      <thead>
        <tr>
          <th>
            <input type="checkbox" aria-label="Select all rows" />
          </th>
          <th class="sortable">Column A <i class="ph ph-caret-up-down sort-icon" aria-hidden="true"></i></th>
          <th class="sortable">Column B <i class="ph ph-caret-up-down sort-icon" aria-hidden="true"></i></th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="checkbox" aria-label="Select row" /></td>
          <td>Sample value</td>
          <td>Sample value</td>
          <td><span class="status-badge available">Active</span></td>
          <td>
            <div class="action-buttons">
              <button type="button" class="action-btn" aria-label="View">
                <i class="ph ph-eye" aria-hidden="true"></i>
              </button>
              <button type="button" class="action-btn" aria-label="Edit">
                <i class="ph ph-pencil-simple" aria-hidden="true"></i>
              </button>
              <button type="button" class="action-btn action-delete" aria-label="Delete">
                <i class="ph ph-trash" aria-hidden="true"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
