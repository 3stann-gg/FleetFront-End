<!-- HIMS UI Kit — Profile Card -->
<div class="card">
  <div class="card-header">
    <h3>Profile</h3>
  </div>
  <div class="u-flex u-gap-3" style="align-items: center">
    <span class="profile-avatar" aria-hidden="true">HM</span>
    <div>
      <p class="fleet-label" style="margin: 0">User Name</p>
      <p class="fleet-meta" style="margin: 0">Role · Department</p>
    </div>
  </div>
  <div class="form-grid" style="margin-top: var(--space-5)">
    <div class="form-group">
      <label for="profileEmail">Email</label>
      <input type="email" id="profileEmail" value="user@hospital.example" readonly />
    </div>
    <div class="form-group">
      <label for="profilePhone">Phone</label>
      <input type="tel" id="profilePhone" placeholder="Optional" />
    </div>
  </div>
</div>
