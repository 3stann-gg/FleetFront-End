<!-- HIMS UI Kit — Filter Section (place inside .toolbar-left) -->
<select class="filter-select" aria-label="Filter by type">
  <option value="all">All Types</option>
  <option value="type-a">Type A</option>
  <option value="type-b">Type B</option>
</select>
<select class="filter-select" aria-label="Filter by status">

</select>
<input type="date" class="filter-select" aria-label="Filter by date" />
