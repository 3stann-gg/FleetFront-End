<!-- HIMS UI Kit — Loading State (skeleton) -->
<div class="card" aria-busy="true" aria-label="Loading content">
  <div class="skeleton-line" style="width: 40%; height: 18px; margin-bottom: var(--space-4)"></div>
  <div class="skeleton-line" style="width: 100%; height: 14px; margin-bottom: var(--space-2)"></div>
  <div class="skeleton-line" style="width: 92%; height: 14px; margin-bottom: var(--space-2)"></div>
  <div class="skeleton-line" style="width: 80%; height: 14px; margin-bottom: var(--space-5)"></div>
  <div class="stats-grid">
    <div class="skeleton-block" style="height: 112px; border-radius: var(--radius-card)"></div>
    <div class="skeleton-block" style="height: 112px; border-radius: var(--radius-card)"></div>
    <div class="skeleton-block" style="height: 112px; border-radius: var(--radius-card)"></div>
    <div class="skeleton-block" style="height: 112px; border-radius: var(--radius-card)"></div>
  </div>
</div>
