<!-- HIMS UI Kit — Standard Modal (form / detail) -->
<div class="modal-overlay" id="himsFormModal" role="dialog" aria-modal="true" aria-labelledby="himsFormModalTitle">
  <div class="custom-modal">
    <div class="modal-header">
      <div>
        <h2 id="himsFormModalTitle">Record</h2>
        <p>Provide the required information below.</p>
      </div>
      <button type="button" class="modal-close" aria-label="Close dialog">
        <i class="ph ph-x" aria-hidden="true"></i>
      </button>
    </div>
    <div class="modal-body">
      <form class="fleet-form" id="himsRecordForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="himsFieldA">Field A <span class="required">*</span></label>
            <input type="text" id="himsFieldA" required maxlength="120" />
            <p class="field-error" hidden></p>
          </div>
          <div class="form-group">
            <label for="himsFieldB">Field B</label>
            <select id="himsFieldB">
              <option value="">Select…</option>
              <option value="a">Option A</option>
              <option value="b">Option B</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label for="himsNotes">Notes</label>
            <textarea id="himsNotes" rows="3"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-outline">Cancel</button>
      <button type="submit" form="himsRecordForm" class="btn-primary">Save</button>
    </div>
  </div>
</div>
