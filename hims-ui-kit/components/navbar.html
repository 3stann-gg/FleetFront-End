<!--
  HIMS UI Kit — Navbar (generic)
  Customize: app identity text, search placeholder
-->
<header class="navbar-custom">
  <div class="navbar-left">
    <button type="button" class="menu-toggle" aria-label="Toggle navigation menu">
      <i class="ph ph-list"></i>
    </button>
    <div class="app-identity">
      <p class="app-identity-title">Module Name Management</p>
      <span class="app-identity-subtitle">Hospital Operations Suite</span>
    </div>
  </div>

  <div class="navbar-center">
    <div class="search-box">
      <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
      <input
        type="text"
        placeholder="Search records..."
        aria-label="Global search"
      />
    </div>
  </div>

  <div class="navbar-right">
    <button type="button" class="icon-btn" aria-label="Notifications" id="himsNotifyBtn">
      <i class="ph ph-bell" aria-hidden="true"></i>
    </button>
    <button type="button" class="icon-btn" aria-label="Messages" id="himsMessageBtn">
      <i class="ph ph-envelope-simple" aria-hidden="true"></i>
    </button>
  </div>
</header>
