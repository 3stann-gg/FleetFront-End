<!-- HIMS UI Kit — Toolbar (includes search + filters slots) -->
<div class="toolbar">
  <div class="toolbar-left">
    <!-- include search-bar + filter-section fragments here -->
  </div>
  <div class="toolbar-right">
    <button type="button" class="btn-outline">
      <i class="ph ph-arrows-clockwise" aria-hidden="true"></i>
      Refresh
    </button>
    <div class="export-dropdown">
      <button type="button" class="btn-outline export-menu-toggle" aria-expanded="false" aria-haspopup="true">
        <i class="ph ph-export" aria-hidden="true"></i>
        Export
        <i class="ph ph-caret-down export-menu-chevron" aria-hidden="true"></i>
      </button>
      <div class="export-menu" hidden role="menu">
        <button type="button" class="export-menu-item" role="menuitem">Print</button>
        <button type="button" class="export-menu-item" role="menuitem">Export PDF</button>
        <button type="button" class="export-menu-item" role="menuitem">Export Excel</button>
      </div>
    </div>
  </div>
</div>
