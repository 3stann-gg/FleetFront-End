<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form | HIMS Module</title>
    <link rel="icon" href="../../assets/images/brand/favicon.svg" type="image/svg+xml" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../../assets/js/core/theme-boot.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/module.css" />
  </head>
  <body data-page="create">
    <!-- FORM LAYOUT — create / edit record screens -->
    <div class="app">
      <div id="sidebar"></div>
      <main class="main-content">
        <div id="navbar"></div>
        <section class="page-wrapper">
          <div class="page-header">
            <div>
              <h1>Create Record</h1>
              <p>Fill in the required fields. Validation belongs in your module validation file.</p>
            </div>
          </div>

          <div class="card">
            <form class="fleet-form" id="moduleForm" novalidate>
              <div class="form-grid">
                <div class="form-group">
                  <label for="fieldName">Name <span class="required">*</span></label>
                  <input type="text" id="fieldName" name="name" required />
                  <p class="field-error" hidden></p>
                </div>
                <div class="form-group">
                  <label for="fieldType">Type <span class="required">*</span></label>
                  <select id="fieldType" name="type" required>
                    <option value="">Select…</option>
                    <option>Type A</option>
                    <option>Type B</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="fieldDate">Date</label>
                  <input type="date" id="fieldDate" name="date" />
                </div>
                <div class="form-group">
                  <label for="fieldStatus">Status</label>
                  <select id="fieldStatus" name="status">
                    <option>Pending</option>
                    <option>Active</option>
                  </select>
                </div>
                <div class="form-group full-width">
                  <label for="fieldNotes">Notes</label>
                  <textarea id="fieldNotes" name="notes" rows="4"></textarea>
                </div>
              </div>
              <div class="form-actions">
                <button type="button" class="btn-outline">Cancel</button>
                <button type="submit" class="btn-primary">Save Record</button>
              </div>
            </form>
          </div>

          <footer class="module-footer">
            <p class="fleet-meta">Hospital Information Management System · Module Name</p>
          </footer>
        </section>
      </main>
      <div id="toast"><div id="toastContainer" class="toast-container"></div></div>
    </div>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/form.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
