<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Management | HIMS Module</title>
    <link rel="icon" href="../../assets/images/brand/favicon.svg" type="image/svg+xml" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../../assets/js/core/theme-boot.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/module.css" />
  </head>
  <body data-page="management">
    <!-- MANAGEMENT LAYOUT — toolbar + table + pagination -->
    <div class="app">
      <div id="sidebar"></div>
      <main class="main-content">
        <div id="navbar"></div>
        <section class="page-wrapper">
          <div class="page-header">
            <div>
              <h1>Record Management</h1>
              <p>Manage module records with search, filters, and actions.</p>
            </div>
            <button type="button" class="btn-primary">
              <i class="ph ph-plus" aria-hidden="true"></i>
              Add Record
            </button>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon"><i class="ph-fill ph-folder" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Total</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon success"><i class="ph-fill ph-check-circle" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Active</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon warning"><i class="ph-fill ph-hourglass" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Pending</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon danger"><i class="ph-fill ph-x-circle" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Closed</p></div>
            </div>
          </div>

          <!-- Toolbar placeholder — components/toolbar.html -->
          <div class="toolbar">
            <div class="toolbar-left">
              <div class="search-box">
                <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                <input type="text" placeholder="Search records..." aria-label="Search records" />
              </div>
              <select class="filter-select" aria-label="Status filter">
                <option value="all">All Status</option>
                <option>Active</option>
                <option>Pending</option>
              </select>
            </div>
            <div class="toolbar-right">
              <button type="button" class="btn-outline">
                <i class="ph ph-arrows-clockwise" aria-hidden="true"></i>
                Refresh
              </button>
            </div>
          </div>

          <!-- Table placeholder — components/table.html -->
          <div class="card">
            <div class="table-responsive">
              <table class="fleet-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Reference</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>Sample record</td>
                    <td>REF-001</td>
                    <td><span class="status-badge available">Active</span></td>
                    <td>
                      <div class="action-buttons">
                        <button type="button" class="action-btn" aria-label="View"><i class="ph ph-eye"></i></button>
                        <button type="button" class="action-btn" aria-label="Edit"><i class="ph ph-pencil-simple"></i></button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <footer class="module-footer">
            <p class="fleet-meta">Hospital Information Management System · Module Name</p>
          </footer>
        </section>
      </main>
      <div id="toast"><div id="toastContainer" class="toast-container"></div></div>
    </div>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/search.js"></script>
    <script src="../assets/js/filters.js"></script>
    <script src="../assets/js/table.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
