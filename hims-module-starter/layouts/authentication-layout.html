<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | HIMS Module</title>
    <link rel="icon" href="../../assets/images/brand/favicon.svg" type="image/svg+xml" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../../assets/js/core/theme-boot.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/module.css" />
  </head>
  <body class="auth-body" data-page="auth">
    <!--
      AUTHENTICATION LAYOUT
      No sidebar / navbar shell. Centered card only.
      Wire to your module session strategy later (do not hard-code Fleet credentials).
    -->
    <div class="auth-shell">
      <div class="card auth-card">
        <div class="auth-brand">
          <div class="logo-icon" aria-hidden="true">
            <i class="ph-fill ph-hospital"></i>
          </div>
          <h1>HIMS Module</h1>
          <p class="fleet-meta">Hospital Operations Suite</p>
        </div>

        <form class="fleet-form" id="authForm" novalidate>
          <div class="form-group">
            <label for="authEmail">Email <span class="required">*</span></label>
            <input type="email" id="authEmail" name="email" autocomplete="username" required />
            <p class="field-error" hidden></p>
          </div>
          <div class="form-group">
            <label for="authPassword">Password <span class="required">*</span></label>
            <input type="password" id="authPassword" name="password" autocomplete="current-password" required />
            <p class="field-error" hidden></p>
          </div>
          <button type="submit" class="btn-primary auth-submit">Sign In</button>
        </form>

        <p class="fleet-meta auth-footer-note">
          Placeholder layout only — connect authentication when backend is available.
        </p>
      </div>
    </div>

    <div id="toast"><div id="toastContainer" class="toast-container"></div></div>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/form.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
