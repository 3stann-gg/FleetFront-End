    <!--
      MAIN LAYOUT
      Reusable shell: sidebar + navbar + page header + content + footer.

      <!-- Sidebar placeholder — paste components/sidebar.html -->

      <main class="main-content">
        <!-- Navbar placeholder — paste components/navbar.html -->

        <section class="page-wrapper">

            <div>
              <h1>Page Title</h1>

            </div>
          </div>

          <!-- Main content slot -->
          <div class="card">
            <p class="fleet-meta">Replace this area with page-specific content.</p>
          </div>

          <!-- Footer placeholder — paste components/footer.html -->
          <footer class="module-footer">
            <p class="fleet-meta">Hospital Information Management System · Module Name</p>
          </footer>
        </section>
      </main>

      <div id="toast">
        <div id="toastContainer" class="toast-container"></div>
      </div>
    </div>

    <script src="../assets/js/utils.js"></script>
