<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports | HIMS Module</title>
    <link rel="icon" href="../../assets/images/brand/favicon.svg" type="image/svg+xml" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../../assets/js/core/theme-boot.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/module.css" />
  </head>
  <body data-page="reports">
    <!-- REPORTS LAYOUT — filters + summary cards + export toolbar -->
    <div class="app">
      <div id="sidebar"></div>
      <main class="main-content">
        <div id="navbar"></div>
        <section class="page-wrapper">
          <div class="page-header">
            <div>
              <h1>Reports</h1>
              <p>Generate and export filtered module reports.</p>
            </div>
            <div class="u-flex u-gap-3">
              <button type="button" class="btn-outline"><i class="ph ph-file-xls" aria-hidden="true"></i> Excel</button>
              <button type="button" class="btn-outline"><i class="ph ph-file-pdf" aria-hidden="true"></i> PDF</button>
              <button type="button" class="btn-outline"><i class="ph ph-printer" aria-hidden="true"></i> Print</button>
            </div>
          </div>

          <div class="toolbar">
            <div class="toolbar-left">
              <input type="date" class="filter-select" aria-label="From date" />
              <input type="date" class="filter-select" aria-label="To date" />
              <select class="filter-select" aria-label="Report type">
                <option value="all">All types</option>
                <option>Summary</option>
                <option>Detailed</option>
              </select>
            </div>
            <div class="toolbar-right">
              <button type="button" class="btn-primary">
                <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                Run Report
              </button>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon"><i class="ph-fill ph-chart-bar" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Rows</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon success"><i class="ph-fill ph-check-circle" aria-hidden="true"></i></div>
              <div class="stat-content"><h3>0</h3><p>Complete</p></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>Report Preview</h3></div>
            <p class="fleet-meta">Replace with filtered report table. Export only filtered data.</p>
          </div>

          <footer class="module-footer">
            <p class="fleet-meta">Hospital Information Management System · Module Name</p>
          </footer>
        </section>
      </main>
      <div id="toast"><div id="toastContainer" class="toast-container"></div></div>
    </div>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/filters.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
