<div class="modal-overlay" id="vehicleModal">
  <div class="custom-modal">
    <!-- Header -->
    <div class="modal-header">
      <div>
        <h2>Add New Vehicle</h2>
        <p>Register a new hospital fleet vehicle.</p>
      </div>

      <button class="modal-close" id="closeVehicleModal">
        <i class="ph ph-x"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <form class="vehicle-form" id="vehicleForm">
        <!-- Vehicle Image -->
        <div class="vehicle-image-section">
          <label class="vehicle-image-label"> Vehicle Image </label>

          <div class="vehicle-image-upload">
            <img
              id="vehiclePreview"
              src="../assets/images/default-vehicle.png"
              alt="Vehicle Preview"
            />

            <input type="file" id="vehicleImage" accept="image/*" hidden />

            <label for="vehicleImage" class="btn-outline upload-btn">
              <i class="ph ph-image"></i>
              Choose Image
            </label>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Plate Number *</label>
            <input type="text" id="vehiclePlate" placeholder="ABC-1234" />
          </div>

          <div class="form-group">
            <label>Vehicle Type *</label>
            <select id="vehicleType"></select>
          </div>

          <div class="form-group">
            <label>Capacity</label>
            <input type="number" placeholder="4" />
          </div>

          <div class="form-group">
            <label>Assigned Driver</label>
            <select id="vehicleDriver"></select>
          </div>

          <div class="form-group">
            <label>Fuel Type</label>
            <select id="vehicleFuel"></select>
          </div>

          <div class="form-group">
            <label>Current Mileage</label>
            <input type="number" placeholder="58240" />
          </div>

          <div class="form-group">
            <label>Status</label>
            <select id="vehicleStatus"></select>
          </div>

          <div class="form-group">
            <label>Purchase Date</label>
            <input type="date" />
          </div>

          <div class="form-group">
            <label>Insurance Expiry</label>
            <input type="date" />
          </div>
        </div>

        <div class="form-group">
          <label>Notes</label>

          <textarea
            rows="4"
            placeholder="Additional vehicle information..."
          ></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-outline" id="cancelVehicleModal">
            Cancel
          </button>

          <button type="submit" class="btn-primary" id="saveVehicleBtn">
            <i class="ph ph-floppy-disk"></i>
            Save Vehicle
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
