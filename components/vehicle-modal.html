<div class="modal-overlay" id="vehicleModal">
  <div class="custom-modal">
    <div class="modal-header">
      <div>
        <h2>Add New Vehicle</h2>

        <p>Register a new hospital fleet vehicle.</p>
      </div>

      <button class="modal-close" id="closeVehicleModal">
        <i class="ph ph-x"></i>
      </button>
    </div>

    <div class="modal-body">
      <form class="vehicle-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Vehicle Name *</label>
            <input type="text" placeholder="e.g. Ambulance 01" />
          </div>

          <div class="form-group">
            <label>Plate Number *</label>
            <input type="text" placeholder="ABC-1234" />
          </div>

          <div class="form-group">
            <label>Vehicle Type *</label>

            <select>
              <option>Select Type</option>
              <option>Ambulance</option>
              <option>Van</option>
              <option>SUV</option>
              <option>Service Vehicle</option>
            </select>
          </div>

          <div class="form-group">
            <label>Capacity</label>
            <input type="number" placeholder="4" />
          </div>

          <div class="form-group">
            <label>Assigned Driver</label>

            <select>
              <option>Select Driver</option>
              <option>Juan Dela Cruz</option>
              <option>Maria Santos</option>
            </select>
          </div>

          <div class="form-group">
            <label>Fuel Type</label>

            <select>
              <option>Gasoline</option>
              <option>Diesel</option>
              <option>Electric</option>
            </select>
          </div>

          <div class="form-group">
            <label>Current Mileage</label>
            <input type="number" placeholder="58240" />
          </div>

          <div class="form-group">
            <label>Status</label>

            <select>
              <option>Available</option>
              <option>On Trip</option>
              <option>Maintenance</option>
            </select>
          </div>

          <div class="form-group">
            <label>Purchase Date</label>
            <input type="date" />
          </div>

          <div class="form-group">
            <label>Insurance Expiry</label>
            <input type="date" />
          </div>
        </div>

        <div class="form-group">
          <label>Notes</label>

          <textarea
            rows="4"
            placeholder="Additional vehicle information..."
          ></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-outline">Cancel</button>

          <button type="submit" class="btn-primary">
            <i class="ph ph-floppy-disk"></i>
            Save Vehicle
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
