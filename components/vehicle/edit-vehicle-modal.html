<div class="modal-overlay" id="editVehicleModal">
  <div class="custom-modal">
    <div class="modal-header">
      <div>
        <h2>Edit Vehicle</h2>
        <p>Update vehicle information.</p>
      </div>

      <button class="modal-close" id="closeEditVehicleModal">
        <i class="ph ph-x"></i>
      </button>
    </div>

    <div class="modal-body">
      <form class="vehicle-form" id="editVehicleForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Vehicle Name</label>
            <input
              type="text"
              id="editVehicleName"
              placeholder="Vehicle Name"
            />
          </div>

          <div class="form-group">
            <label>Plate Number</label>
            <input
              type="text"
              id="editVehiclePlate"
              placeholder="Plate Number"
            />
          </div>

          <div class="form-group">
            <label>Vehicle Type</label>
            <select id="editVehicleType">
              <option value="">Select Vehicle Type</option>
              <option>Ambulance</option>
              <option>Patient Van</option>
              <option>Service Vehicle</option>
              <option>SUV</option>
              <option>Motorcycle</option>
            </select>
          </div>

          <div class="form-group">
            <label>Assigned Driver</label>
            <select id="editVehicleDriver">
              <option value="">Select Driver</option>
              <option>Juan Dela Cruz</option>
              <option>Pedro Santos</option>
              <option>Maria Reyes</option>
              <option>Carlos Mendoza</option>
            </select>
          </div>

          <div class="form-group">
            <label>Fuel Type</label>
            <select id="editVehicleFuel">
              <option value="">Select Fuel Type</option>
              <option>Diesel</option>
              <option>Gasoline</option>
              <option>Electric</option>
              <option>Hybrid</option>
            </select>
          </div>

          <div class="form-group">
            <label>Status</label>
            <select id="editVehicleStatus">
              <option value="">Select Status</option>
              <option>Available</option>
              <option>On Trip</option>
              <option>Maintenance</option>
              <option>Out of Service</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Notes</label>

          <textarea
            id="editVehicleNotes"
            rows="4"
            placeholder="Additional notes..."
          ></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-outline" id="cancelEditVehicle">
            Cancel
          </button>

          <button type="submit" id="updateVehicleBtn" class="btn-primary">
            <i class="ph ph-floppy-disk"></i>
            Update Vehicle
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
