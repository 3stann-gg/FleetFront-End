<div class="modal-overlay" id="viewVehicleModal">
  <div class="custom-modal">
    <div class="modal-header">
      <div>
        <h2>Vehicle Details</h2>
        <p>View complete vehicle information.</p>
      </div>

      <button class="modal-close" id="closeViewVehicleModal">
        <i class="ph ph-x"></i>
      </button>
    </div>
    <div class="vehicle-profile">
      <img
        id="viewVehicleImage"
        src="../assets/images/vehicle-placeholder.png"
        alt="Vehicle"
      />

      <h3>Ambulance 01</h3>

      <p>Emergency Response Unit</p>
    </div>

    <div class="modal-body">
      <div class="vehicle-profile">
        <div class="vehicle-profile-icon">
          <i class="ph-fill ph-ambulance"></i>
        </div>

        <div>
          <h3>Ambulance 01</h3>
          <span class="status-badge available">Available</span>
        </div>
      </div>

      <div class="details-grid">
        <div class="detail-item">
          <label>Plate Number</label>
          <p>ABC-1234</p>
        </div>

        <div class="detail-item">
          <label>Vehicle Type</label>
          <p>Ambulance</p>
        </div>

        <div class="detail-item">
          <label>Driver</label>
          <p>Juan Dela Cruz</p>
        </div>

        <div class="detail-item">
          <label>Fuel Type</label>
          <p>Diesel</p>
        </div>

        <div class="detail-item">
          <label>Fuel Level</label>
          <p>85%</p>
        </div>

        <div class="detail-item">
          <label>Mileage</label>
          <p>58,240 km</p>
        </div>

        <div class="detail-item">
          <label>Purchase Date</label>
          <p>July 12, 2025</p>
        </div>

        <div class="detail-item">
          <label>Insurance Expiry</label>
          <p>July 12, 2027</p>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-outline" id="closeViewBtn">Close</button>

        <button class="btn-primary" id="editVehicleBtn">
          <i class="ph ph-pencil-simple"></i>
          Edit Vehicle
        </button>
      </div>
    </div>
  </div>
</div>
