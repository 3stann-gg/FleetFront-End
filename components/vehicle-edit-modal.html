<div class="modal-overlay" id="editVehicleModal">
  <div class="custom-modal">
    <div class="modal-header">
      <div>
        <h2>Edit Vehicle</h2>
        <p>Update vehicle information.</p>
      </div>

      <button class="modal-close" id="closeEditVehicleModal">
        <i class="ph ph-x"></i>
      </button>
    </div>

    <div class="modal-body">
      <form class="vehicle-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Vehicle Name</label>
            <input type="text" value="Ambulance 01" />
          </div>

          <div class="form-group">
            <label>Plate Number</label>
            <input type="text" value="ABC-1234" />
          </div>

          <div class="form-group">
            <label>Vehicle Type</label>
            <select>
              <option selected>Ambulance</option>
              <option>Van</option>
              <option>SUV</option>
              <option>Service Vehicle</option>
            </select>
          </div>

          <div class="form-group">
            <label>Assigned Driver</label>
            <input type="text" value="Juan Dela Cruz" />
          </div>

          <div class="form-group">
            <label>Fuel Type</label>
            <select>
              <option selected>Diesel</option>
              <option>Gasoline</option>
              <option>Electric</option>
            </select>
          </div>

          <div class="form-group">
            <label>Status</label>
            <select>
              <option selected>Available</option>
              <option>On Trip</option>
              <option>Maintenance</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Notes</label>

          <textarea rows="4">Emergency Response Vehicle</textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-outline" id="cancelEditVehicle">
            Cancel
          </button>

          <button type="submit" class="btn-primary">
            <i class="ph ph-floppy-disk"></i>
            Update Vehicle
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
